  body: |-
    The main connective of a molecular formula is the connective introduced at the final formation step:
    \begin{enumerate}
    \item for \(\neg\varphi\), the main connective is \(\neg\);
    \item for \((\varphi\circ\psi)\), the main connective is \(\circ\).
    \end{enumerate}
    Atomic formulas have no main connective.
  quantified_form: |-
    \[
    \operatorname{MainConnective}(\neg\varphi,\neg)
    \quad\text{and}\quad
    \operatorname{MainConnective}((\varphi\circ\psi),\circ).
    \]
  predicate_reading: \(\operatorname{MainConnective}(\varphi,c)\) means that \(c\) is the outermost connective
    introduced in the final formation step of \(\varphi\).
  interpretation: The main connective identifies the outermost syntactic operation. It is the first connective
    used when analyzing a formula from the outside inward.
- label: thm:structural-induction-propositional-formulas
  kind: theorem
  title: Structural Induction for Propositional Formulas
  dependencies:
  - def:well-formed-formula
  predicates:
    defines: []
    uses:
    - WellFormedFormula
    - PropositionalVariable
  notations:
    defines: []
    uses:
    - symbol: \WFF
      name: well-formed formula set
      meaning: the set of propositional well-formed formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_set
    - symbol: \Prop
      name: propositional variable set
      meaning: the set of propositional variables
      scope: chapter
      status: canonical
      registry_id: propositional_logic.variable_set
    - symbol: \varphi,\psi,\chi,\theta
      name: formula metavariables
      meaning: metavariables ranging over propositional well-formed formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula_metavariables
    - symbol: \neg
      name: negation
      meaning: unary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.negation
    - symbol: \land
      name: conjunction
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conjunction
    - symbol: \lor
      name: disjunction
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.disjunction
    - symbol: \to
      name: conditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conditional
    - symbol: \leftrightarrow
      name: biconditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.biconditional
    - symbol: \circ
      name: generic binary connective
      meaning: an arbitrary member of \(\{\land,\lor,\to,\leftrightarrow\}\)
      scope: global
      status: canonical
      registry_id: propositional_logic.generic_binary_connective
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    Let \(A(\varphi)\) be a property of well-formed formulas. Suppose:
    \begin{enumerate}
    \item \(A(P)\) holds for every \(P\in\Prop\);
    \item if \(A(\varphi)\) holds, then \(A(\neg\varphi)\) holds;
    \item if \(A(\varphi)\) and \(A(\psi)\) hold, then \(A((\varphi\circ\psi))\) holds for every \(\circ\in\{\land,\lor,\to,\leftrightarrow\}\).
    \end{enumerate}
    Then \(A(\theta)\) holds for every \(\theta\in\WFF\).
  quantified_form: |-
    \[
    \left[
    (\forall P\in\Prop)A(P)
    \land
    (\forall\varphi\in\WFF)(A(\varphi)\to A(\neg\varphi))
    \land
    (\forall\varphi,\psi\in\WFF)
    (\forall\circ\in\{\land,\lor,\to,\leftrightarrow\})
    \bigl((A(\varphi)\land A(\psi))\to A((\varphi\circ\psi))\bigr)
    \right]
    \to
    (\forall\theta\in\WFF)A(\theta).
    \]
  interpretation: To prove a statement for all formulas, it suffices to prove it for propositional variables
    and show it is preserved by each formula-forming operation.
