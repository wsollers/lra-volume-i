  body: |-
    A propositional variable is an atomic symbol intended to stand for a proposition. A standard supply of variables is
    \[
    \Prop=\{P_1,P_2,P_3,\ldots\}.
    \]
    Informally, variables are often written \(P,Q,R,S,\ldots\).
  quantified_form: |-
    \[
    \operatorname{PropositionalVariable}(P)\Longleftrightarrow P\in\Prop.
    \]
  predicate_reading: \(\operatorname{PropositionalVariable}(P)\) means \(P\in\Prop\).
  interpretation: A propositional variable has no internal syntactic structure in propositional logic.
    It is a basic symbol from which more complex formulas are formed.
  examples: \(P,Q,R,P_1,P_2\) are propositional variables when they belong to \(\Prop\).
  non_examples: \(\neg P\), \(P\land Q\), and \((P\to Q)\) are not propositional variables; they are compound
    formulas.
