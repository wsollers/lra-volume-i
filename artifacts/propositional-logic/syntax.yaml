  notations:
    defines:
    - symbol: \mathbb{B}
      name: truth-value set
      meaning: the set of truth values
      scope: global
      status: canonical
      introduced_by: def:truth-value-propositional-logic
      registry_id: propositional_logic.truth_values
    uses: []
  relations:
    defines: []
    uses: []
  proof_required: false
  body: |-
    The set of truth values is
    \[
    \mathbb B := \{\mathrm{False},\mathrm{True}\}.
    \]
    Some sources identify this set with \(\{0,1\}\), with \(0\) read as false and \(1\) read as true.
  quantified_form: |-
    \[
    \mathbb B=\{\mathrm{False},\mathrm{True}\}.
    \]
  interpretation: Truth values are the semantic targets of propositional formulas. Syntax determines which
    strings are formulas; semantics later assigns elements of \(\mathbb B\) to formulas.
