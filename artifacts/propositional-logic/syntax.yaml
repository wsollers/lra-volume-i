  dependencies:
  - def:subformula-propositional-logic
  - def:formula-depth-propositional-logic
  predicates:
    defines: []
    uses:
    - Subformula
    - FormulaDepth
    - WellFormedFormula
  notations:
    defines: []
    uses:
    - symbol: \operatorname{Sub}(\varphi)
      name: subformula set
      meaning: the set of subformulas of a formula
      scope: chapter
      status: canonical
      registry_id: propositional_logic.subformula_set
    - symbol: \operatorname{depth}(\varphi)
      name: formula depth
      meaning: height of the formula tree
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_depth
    - symbol: \WFF
      name: well-formed formula set
      meaning: the set of propositional well-formed formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_set
    - symbol: \varphi
      name: formula metavariable
      meaning: a metavariable ranging over formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula
    - symbol: \psi
      name: second formula metavariable
      meaning: a metavariable ranging over formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.second_formula
    - symbol: \land
      name: conjunction
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conjunction
    - symbol: \to
      name: conditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conditional
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    If \(\psi\) is a proper subformula of \(\varphi\), then
    \[
    \operatorname{depth}(\psi)<\operatorname{depth}(\varphi).
    \]
  quantified_form: |-
    \[
    (\forall\varphi,\psi\in\WFF)
    \left[
    \psi\in\operatorname{Sub}(\varphi)\land \psi\ne\varphi
    \to
    \operatorname{depth}(\psi)<\operatorname{depth}(\varphi)
    \right].
    \]
  interpretation: Every descent into a proper subformula lowers formula depth. This justifies induction
    on formula depth and recursive proofs over subformulas.
- label: lem:finiteness-of-variables-propositional-formulas
  kind: lemma
  title: Finiteness of Variables in a Formula
  dependencies:
  - def:formula-variable-set-propositional-logic
  - thm:structural-induction-propositional-formulas
  predicates:
    defines: []
    uses:
    - WellFormedFormula
    - FormulaVariableSet
  notations:
    defines: []
    uses:
    - symbol: \operatorname{Var}(\varphi)
      name: variable set of a formula
      meaning: the set of variables occurring in a formula
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_variable_set
    - symbol: \WFF
      name: well-formed formula set
      meaning: the set of propositional well-formed formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_set
    - symbol: \varphi
      name: formula metavariable
      meaning: a metavariable ranging over formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula
  relations:
    defines: []
    uses: []
  proof_required: true
  body: For every \(\varphi\in\WFF\), the set \(\operatorname{Var}(\varphi)\) is finite.
  quantified_form: |-
    \[
    (\forall\varphi\in\WFF)\quad
    \operatorname{Var}(\varphi)\text{ is finite}.
    \]
  interpretation: Every formula depends on only finitely many propositional variables, even though the
    language may contain infinitely many variables.
