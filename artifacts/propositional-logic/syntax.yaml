      registry_id: propositional_logic.generic_binary_connective
    uses:
    - symbol: \varphi,\psi
      name: formula metavariables
      meaning: metavariables ranging over formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula_metavariables
  relations:
    defines: []
    uses: []
  proof_required: false
  body: |-
    The standard primitive propositional connectives are
    \[
    \neg,\qquad \land,\qquad \lor,\qquad \to,\qquad \leftrightarrow.
    \]
    The connective \(\neg\) is unary. The connectives \(\land,\lor,\to,\leftrightarrow\) are binary.

    \[
    \begin{array}{c|c|c|c|c}
    \text{Symbol} & \text{Name} & \text{Arity} & \text{Formation pattern} & \text{Reading}\\
    \hline
    \neg & \text{negation} & \text{unary} & \neg\varphi & \text{not }\varphi\\
    \land & \text{conjunction} & \text{binary} & (\varphi\land\psi) & \varphi\text{ and }\psi\\
    \lor & \text{disjunction} & \text{binary} & (\varphi\lor\psi) & \varphi\text{ or }\psi\\
    \to & \text{conditional} & \text{binary} & (\varphi\to\psi) & \text{if }\varphi,\text{ then }\psi\\
    \leftrightarrow & \text{biconditional} & \text{binary} & (\varphi\leftrightarrow\psi) & \varphi\text{ iff }\psi
    \end{array}
    \]
  quantified_form: |-
    \[
    \operatorname{UnaryConnective}(\neg)
    \quad\text{and}\quad
    \operatorname{BinaryConnective}(\land)\land \operatorname{BinaryConnective}(\lor)\land \operatorname{BinaryConnective}(\to)\land \operatorname{BinaryConnective}(\leftrightarrow).
    \]
  interpretation: Arity records how many formulas a connective uses to form a new formula. The truth behavior
    of these connectives belongs to semantics, not to the syntactic definition.
- label: def:well-formed-formula
  kind: definition
  title: Well-Formed Formula
  dependencies:
  - def:propositional-variable
  - def:logical-connective
  predicates:
    defines:
    - WellFormedFormula
    uses:
    - PropositionalVariable
    - LogicalConnective
  notations:
    defines:
    - symbol: \WFF
      name: well-formed formula set
      meaning: the set of propositional well-formed formulas
      scope: chapter
      status: canonical
      introduced_by: def:well-formed-formula
      registry_id: propositional_logic.formula_set
    uses:
    - symbol: \Prop
      name: propositional variable set
      meaning: the set of propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.variable_set
    - symbol: \varphi,\psi,\chi,\theta
      name: formula metavariables
      meaning: metavariables ranging over propositional well-formed formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula_metavariables
    - symbol: \neg
      name: negation
      meaning: unary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.negation
    - symbol: \land
      name: conjunction
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conjunction
    - symbol: \lor
      name: disjunction
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.disjunction
    - symbol: \to
      name: conditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conditional
    - symbol: \leftrightarrow
      name: biconditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.biconditional
    - symbol: \circ
      name: generic binary connective
      meaning: an arbitrary member of \(\{\land,\lor,\to,\leftrightarrow\}\)
      scope: global
      status: canonical
      registry_id: propositional_logic.generic_binary_connective
  relations:
    defines: []
    uses:
    - label: rel:generated-by-formation-rules
      meaning: generated by recursive formation rules
      status: local
  proof_required: false
  body: |-
    The set \(\WFF\) of well-formed formulas is the smallest set of strings satisfying the following formation rules:
    \begin{enumerate}
    \item Every propositional variable \(P\in\Prop\) belongs to \(\WFF\).
    \item If \(\varphi\in\WFF\), then \(\neg\varphi\in\WFF\).
    \item If \(\varphi,\psi\in\WFF\) and \(\circ\in\{\land,\lor,\to,\leftrightarrow\}\), then \((\varphi\circ\psi)\in\WFF\).
    \item No string is a well-formed formula unless it is obtained by finitely many applications of the previous clauses.
    \end{enumerate}
  quantified_form: |-
    \[
    \WFF
    =
    \bigcap
    \left\{
    S :
    \Prop\subseteq S,\;
    (\forall\varphi\in S)(\neg\varphi\in S),\;
    (\forall\varphi,\psi\in S)
    (\forall\circ\in\{\land,\lor,\to,\leftrightarrow\})
    \bigl((\varphi\circ\psi)\in S\bigr)
    \right\}.
    \]
  predicate_reading: "\\(\\operatorname{WellFormedFormula}(\\varphi)\\) means \\(\\varphi\\in\\WFF\\),\
    \ read as \u201C\\(\\varphi\\) is a well-formed formula.\u201D"
  negation_predicate_reading: \(\neg \operatorname{WellFormedFormula}(\sigma)\) means the string \(\sigma\)
    is excluded by at least one formation-closed set containing \(\Prop\); equivalently, it is not generated
    by finitely many applications of the formation rules.
  interpretation: Well-formed formulas are exactly the strings to which the semantic and proof-theoretic
    machinery of propositional logic applies.
  failure_mode_decomposition: |-
    \[
    \underbrace{P\land}_{\text{missing right operand}}
    \qquad
    \underbrace{(P\ Q)}_{\text{missing binary connective}}
    \qquad
    \underbrace{\neg\lor P}_{\text{negation applied to a non-formula}}.
    \]
  examples: \(P\), \(\neg P\), \((P\to Q)\), and \((P\to(Q\lor R))\) are well-formed formulas.
  non_examples: \(P\land\), \((P Q)\), and \(\neg\lor P\) are not well-formed formulas.
  negated_form: |-
    \[
    \sigma\notin\WFF
    \Longleftrightarrow
    \exists S
    \left[
    \Prop\subseteq S
    \land
    (\forall\varphi\in S)(\neg\varphi\in S)
    \land
    (\forall\varphi,\psi\in S)
    (\forall\circ\in\{\land,\lor,\to,\leftrightarrow\})
    ((\varphi\circ\psi)\in S)
    \land
    \sigma\notin S
    \right].
    \]
