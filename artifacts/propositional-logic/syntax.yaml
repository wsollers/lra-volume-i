      registry_id: propositional_logic.generic_binary_connective
    - symbol: \alpha,\beta
      name: additional formula metavariables
      meaning: formula metavariables used in comparison statements
      scope: chapter
      status: local
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    The propositional formula constructors are injective:
    \begin{enumerate}
    \item if \(\neg\varphi=\neg\psi\), then \(\varphi=\psi\);
    \item if \((\varphi\circ\psi)=(\alpha\star\beta)\), then \(\varphi=\alpha\), \(\psi=\beta\), and \(\circ=\star\).
    \end{enumerate}
  quantified_form: |-
    \[
    (\forall\varphi,\psi\in\WFF)
    (\neg\varphi=\neg\psi\to\varphi=\psi)
    \]
    and
    \[
    (\forall\varphi,\psi,\alpha,\beta\in\WFF)
    (\forall\circ,\star\in\{\land,\lor,\to,\leftrightarrow\})
    \left[
    (\varphi\circ\psi)=(\alpha\star\beta)
    \to
    (\varphi=\alpha\land\psi=\beta\land\circ=\star)
    \right].
    \]
  interpretation: If two formulas are built by the same outer constructor and are equal as strings, then
    their immediate constituents are equal.
