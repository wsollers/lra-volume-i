    - symbol: \to
      name: conditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conditional
    - symbol: \leftrightarrow
      name: biconditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.biconditional
    - symbol: \circ
      name: generic binary connective
      meaning: an arbitrary member of \(\{\land,\lor,\to,\leftrightarrow\}\)
      scope: global
      status: canonical
      registry_id: propositional_logic.generic_binary_connective
    - symbol: \Prop
      name: propositional variable set
      meaning: the set of propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.variable_set
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    To define a function \(F\) on \(\WFF\), it suffices to specify:
    \begin{enumerate}
    \item \(F(P)\) for every \(P\in\Prop\);
    \item \(F(\neg\varphi)\) in terms of \(F(\varphi)\);
    \item \(F((\varphi\circ\psi))\) in terms of \(F(\varphi)\), \(F(\psi)\), and \(\circ\).
    \end{enumerate}
    When these clauses respect the formation rules, they determine a unique function on \(\WFF\).
  quantified_form: |-
    \[
    \text{recursive data on the formation clauses of }\WFF
    \Longrightarrow
    \exists!F:\WFF\to X
    \text{ satisfying those clauses}.
    \]
  interpretation: Structural recursion justifies recursive definitions such as variables of a formula,
    subformulas, depth, connective count, syntax tree, and truth evaluation.
