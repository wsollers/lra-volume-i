      name: v,w
      meaning: v,w
      scope: global
      status: canonical
      registry_id: propositional_logic.truth_assignment
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    Let \(v,w:\Prop\to\mathbb{B}\) be truth assignments. If \(v\) and \(w\) agree on every propositional variable occurring in \(\varphi\), then they assign the same truth value to \(\varphi\):
    \[
    v|_{\operatorname{Var}(\varphi)}
    =
    w|_{\operatorname{Var}(\varphi)}
    \Longrightarrow
    \widehat v(\varphi)=\widehat w(\varphi).
    \]
  quantified_form: |-
    \[
    (\forall\varphi\in\WFF)
    (\forall v,w:\Prop\to\mathbb{B})
    \left[
    (\forall P\in\operatorname{Var}(\varphi))(v(P)=w(P))
    \to
    \widehat v(\varphi)=\widehat w(\varphi)
    \right].
    \]
  interpretation: The truth value of a formula depends only on the variables actually occurring in that
    formula.
  proof_sketch: Prove by structural induction on \(\varphi\). Atomic case follows from agreement on variables.
    Negation and binary connective cases follow from the induction hypothesis and the recursive truth
    clauses.
