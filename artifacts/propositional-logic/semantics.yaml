    - symbol: \land
      name: conjunction
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conjunction
    - symbol: \to
      name: conditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conditional
    - symbol: v
      name: truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.truth_assignment
    - symbol: w
      name: second truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.second_truth_assignment
  relations:
    defines: []
    uses: []
  proof_required: false
  body: |-
    Let \(\varphi\in\WFF\) and suppose the variables occurring in \(\varphi\) are among \(P_1,\ldots,P_n\). A truth table for \(\varphi\) is a finite table with one row for each assignment
    \[
    a:\{P_1,\ldots,P_n\}\to\mathbb{B}
    \]
    and a final column recording the value of \(\widehat v(\varphi)\) for any truth assignment \(v\) extending \(a\).
  quantified_form: |-
    \[
    \operatorname{TruthTable}(\varphi)
    \Longleftrightarrow
    \varphi\in\WFF
    \land
    \operatorname{Var}(\varphi)=\{P_1,\ldots,P_n\}
    \land
    \text{the table has }2^n\text{ assignment rows}.
    \]
  interpretation: A truth table is finite because every formula contains only finitely many variables.
    It records the complete truth behavior of a formula.
