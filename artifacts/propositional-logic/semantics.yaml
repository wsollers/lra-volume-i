    - WellFormedFormula
  notations:
    defines:
    - symbol: v\models\Gamma
      name: satisfaction of a set
      meaning: truth assignment satisfies each formula in a set
      scope: chapter
      status: canonical
      registry_id: propositional_logic.satisfaction_set
    - symbol: \Gamma
      name: set of premise formulas
      meaning: a set of propositional formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.premise_set
    uses:
    - symbol: v\models\varphi
      name: satisfaction of a formula
      meaning: truth assignment satisfies a formula
      scope: chapter
      status: canonical
      registry_id: propositional_logic.satisfaction_formula
    - symbol: \WFF
      name: well-formed formula set
      meaning: the set of propositional well-formed formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_set
    - symbol: \land
      name: conjunction
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conjunction
    - symbol: v
      name: truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.truth_assignment
    - symbol: w
      name: second truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.second_truth_assignment
  relations:
    defines: []
    uses: []
  proof_required: false
  body: |-
    Let \(\Gamma\subseteq\WFF\). A truth assignment \(v\) satisfies \(\Gamma\), written
    \[
    v\models\Gamma,
    \]
    if \(v\models\gamma\) for every \(\gamma\in\Gamma\).
  quantified_form: |-
    \[
    v\models\Gamma
    \Longleftrightarrow
    \operatorname{TruthAssignment}(v)
    \land
    \Gamma\subseteq\WFF
    \land
    (\forall\gamma\in\Gamma)(v\models\gamma).
    \]
  predicate_reading: |-
    \[
    \operatorname{SatisfiesSet}(v,\Gamma)
    \]
    means \(v\) satisfies every formula in \(\Gamma\).
  interpretation: Satisfaction of a set means simultaneous satisfaction of every formula in the set.
  negated_form: |-
    \[
    v\not\models\Gamma
    \Longleftrightarrow
    \exists\gamma\in\Gamma\text{ such that }v\not\models\gamma.
    \]
