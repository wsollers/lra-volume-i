    uses:
    - TruthAssignment
    - WellFormedFormula
  notations:
    defines:
    - symbol: v\models\varphi
      name: satisfaction of a formula
      meaning: truth assignment satisfies a formula
      scope: chapter
      status: canonical
      registry_id: propositional_logic.satisfaction_formula
    uses:
    - symbol: v
      name: truth assignment
      meaning: truth assignment on propositional variables
      scope: chapter
      status: canonical
      registry_id: propositional_logic.truth_assignment
    - symbol: \widehat v
      name: extended truth assignment
      meaning: unique extension to formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.extended_truth_assignment
    - symbol: \WFF
      name: well-formed formula set
      meaning: the set of propositional well-formed formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_set
    - symbol: \varphi,\psi,\chi,\theta
      name: formula metavariables
      meaning: metavariables ranging over propositional well-formed formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula_metavariables
    - symbol: \land
      name: conjunction
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conjunction
    - symbol: w
      name: second truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.second_truth_assignment
    - symbol: \models\varphi
      name: tautology notation
      meaning: formula valid under every truth assignment
      scope: global
      status: canonical
      registry_id: propositional_logic.validity_formula
  relations:
    defines: []
    uses: []
  proof_required: false
  body: |-
    Let \(v\) be a truth assignment and let \(\varphi\in\WFF\). We say that \(v\) satisfies \(\varphi\), written
    \[
    v\models\varphi,
    \]
    if
    \[
    \widehat v(\varphi)=\mathrm{True}.
    \]
  quantified_form: |-
    \[
    v\models\varphi
    \Longleftrightarrow
    \operatorname{TruthAssignment}(v)
    \land
    \varphi\in\WFF
    \land
    \widehat v(\varphi)=\mathrm{True}.
    \]
  predicate_reading: |-
    \[
    \operatorname{SatisfiesFormula}(v,\varphi)
    \]
    means \(v\models\varphi\).
  interpretation: The notation \(v\models\varphi\) means that the formula \(\varphi\) is true under the
    truth assignment \(v\).
  negated_form: |-
    \[
    v\not\models\varphi
    \Longleftrightarrow
    \widehat v(\varphi)=\mathrm{False}.
    \]
- label: def:satisfaction-set-propositional-logic
  kind: definition
  title: Satisfaction of a Set of Formulas
