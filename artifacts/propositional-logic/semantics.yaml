      scope: global
      status: canonical
      registry_id: propositional_logic.second_truth_assignment
  relations:
    defines: []
    uses: []
  proof_required: false
  body: |-
    A truth assignment for propositional logic is a function
    \[
    v:\Prop\to\mathbb{B}.
    \]
    Thus a truth assignment assigns either \(\mathrm{False}\) or \(\mathrm{True}\) to each propositional variable.
  quantified_form: |-
    \[
    \operatorname{TruthAssignment}(v)
    \Longleftrightarrow
    v:\Prop\to\mathbb{B}.
    \]
  predicate_reading: |-
    \[
    \operatorname{TruthAssignment}(v)
    \]
    means that \(v\) assigns a truth value to every propositional variable.
  interpretation: A truth assignment fixes the truth values of atomic formulas. The recursive semantics
    of the connectives then determines the truth value of each molecular formula.
- label: thm:unique-extension-truth-assignment-propositional-logic
  kind: theorem
  title: Unique Extension of a Truth Assignment
  dependencies:
  - def:truth-assignment-propositional-logic
  - def:well-formed-formula
  - thm:structural-recursion-propositional-formulas
  - thm:unique-decomposition-propositional-formulas
  predicates:
    defines: []
    uses:
    - TruthAssignment
    - WellFormedFormula
  notations:
    defines:
    - symbol: \widehat v
      name: extended truth assignment
      meaning: unique extension of a truth assignment to formulas
      scope: chapter
      status: canonical
      introduced_by: thm:unique-extension-truth-assignment-propositional-logic
      registry_id: propositional_logic.extended_truth_assignment
    uses:
    - symbol: v
      name: truth assignment
      meaning: truth assignment on propositional variables
      scope: chapter
      status: canonical
      registry_id: propositional_logic.truth_assignment
    - symbol: \Prop
      name: propositional variable set
      meaning: the set of propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.variable_set
    - symbol: \mathbb{B}
      name: truth-value set
      meaning: the set of truth values
      scope: global
      status: canonical
      registry_id: propositional_logic.truth_values
    - symbol: \WFF
      name: well-formed formula set
      meaning: the set of propositional well-formed formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_set
    - symbol: \neg,\land,\lor,\to,\leftrightarrow
      name: standard connectives
      meaning: standard propositional connectives
      scope: global
      status: canonical
      registry_id: propositional_logic.standard_connectives
    - symbol: \varphi,\psi,\chi,\theta
      name: formula metavariables
      meaning: metavariables ranging over propositional well-formed formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula_metavariables
    - symbol: w
      name: second truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.second_truth_assignment
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    Every truth assignment \(v:\Prop\to\mathbb{B}\) extends uniquely to a function
    \[
    \widehat v:\WFF\to\mathbb{B}
    \]
    satisfying the following clauses:
    \[
    \widehat v(P)=v(P)\quad(P\in\Prop),
    \]
    \[
    \widehat v(\neg\varphi)=\mathrm{True}
    \Longleftrightarrow
    \widehat v(\varphi)=\mathrm{False},
    \]
    \[
    \widehat v(\varphi\land\psi)=\mathrm{True}
    \Longleftrightarrow
    \widehat v(\varphi)=\mathrm{True}
    \text{ and }
    \widehat v(\psi)=\mathrm{True},
    \]
    \[
    \widehat v(\varphi\lor\psi)=\mathrm{True}
    \Longleftrightarrow
    \widehat v(\varphi)=\mathrm{True}
    \text{ or }
    \widehat v(\psi)=\mathrm{True},
    \]
    \[
    \widehat v(\varphi\to\psi)=\mathrm{True}
    \Longleftrightarrow
    \widehat v(\varphi)=\mathrm{False}
    \text{ or }
    \widehat v(\psi)=\mathrm{True},
    \]
    and
    \[
    \widehat v(\varphi\leftrightarrow\psi)=\mathrm{True}
    \Longleftrightarrow
    \widehat v(\varphi)=\widehat v(\psi).
    \]
  quantified_form: |-
    \[
    \begin{aligned}
    &(\forall v:\Prop\to\mathbb{B})(\exists!\widehat v:\WFF\to\mathbb{B})\\
    &\quad\text{such that, for all }P\in\Prop\text{ and }\varphi,\psi\in\WFF,\\
    &\quad \widehat v(P)=v(P),\\
    &\quad \widehat v(\neg\varphi)=\mathrm{True}
       \Longleftrightarrow \widehat v(\varphi)=\mathrm{False},\\
    &\quad \widehat v(\varphi\land\psi)=\mathrm{True}
       \Longleftrightarrow
       (\widehat v(\varphi)=\mathrm{True}\land \widehat v(\psi)=\mathrm{True}),\\
    &\quad \widehat v(\varphi\lor\psi)=\mathrm{True}
       \Longleftrightarrow
       (\widehat v(\varphi)=\mathrm{True}\lor \widehat v(\psi)=\mathrm{True}),\\
    &\quad \widehat v(\varphi\to\psi)=\mathrm{True}
       \Longleftrightarrow
       (\widehat v(\varphi)=\mathrm{False}\lor \widehat v(\psi)=\mathrm{True}),\\
    &\quad \widehat v(\varphi\leftrightarrow\psi)=\mathrm{True}
       \Longleftrightarrow
       \widehat v(\varphi)=\widehat v(\psi).
    \end{aligned}
    \]
  interpretation: A valuation on variables determines exactly one truth value for every formula. This
    theorem is the semantic counterpart of structural recursion and unique decomposition.
  proof_sketch: Use structural recursion to define \(\widehat v\). Use structural induction or uniqueness
    of recursive definitions to prove uniqueness.
- label: def:satisfaction-propositional-formula
  kind: definition
  title: Satisfaction of a Formula
  dependencies:
