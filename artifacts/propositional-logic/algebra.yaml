    - symbol: \varphi,\psi,\chi,\theta
      name: formula metavariables
      meaning: metavariables ranging over propositional well-formed formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula_metavariables
    - symbol: \land
      name: conjunction
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conjunction
    - symbol: \to
      name: conditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conditional
    - symbol: v
      name: truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.truth_assignment
    - symbol: w
      name: second truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.second_truth_assignment
    - symbol: \equiv
      name: logical equivalence symbol
      meaning: logical equivalence relation between formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.logical_equivalence
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    Logical equivalence is reflexive, symmetric, and transitive on \(\WFF\):
    \[
    \varphi\equiv\varphi,
    \qquad
    \varphi\equiv\psi\Longrightarrow\psi\equiv\varphi,
    \]
    and
    \[
    (\varphi\equiv\psi\land\psi\equiv\chi)
    \Longrightarrow
    \varphi\equiv\chi.
    \]
  quantified_form: |-
    \[
    \begin{aligned}
    &(\forall\varphi\in\WFF)(\varphi\equiv\varphi),\\
    &(\forall\varphi,\psi\in\WFF)(\varphi\equiv\psi\to\psi\equiv\varphi),\\
    &(\forall\varphi,\psi,\chi\in\WFF)
    ((\varphi\equiv\psi\land\psi\equiv\chi)\to\varphi\equiv\chi).
    \end{aligned}
    \]
  interpretation: Logical equivalence behaves like equality at the semantic level.
  proof_sketch: Unfold logical equivalence as equality of truth values under every truth assignment.
- label: thm:basic-boolean-equivalence-laws-propositional-logic
  kind: theorem
  title: Basic Boolean Equivalence Laws
