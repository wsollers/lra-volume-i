  proof_required: false
  body: A formula context \(C[-]\) is a well-formed formula with one distinguished placeholder occurrence
    \([-]\). For each well-formed formula \(\varphi\), the expression \(C[\varphi]\) denotes the formula
    obtained by replacing the placeholder with \(\varphi\).
  quantified_form: |-
    \[
    \operatorname{FormulaContext}(C[-])
    \Longrightarrow
    (\forall\varphi\in\WFF)(C[\varphi]\in\WFF).
    \]
  predicate_reading: |-
    \[
    \operatorname{FormulaContext}(C[-])
    \]
    means that \(C[-]\) is a one-hole propositional formula context.
  interpretation: A formula context is a syntactic environment into which a formula can be inserted. Contexts
    make precise the idea of replacing a subformula inside a larger formula.
- label: thm:replacement-of-logical-equivalents-propositional-logic
  kind: theorem
  title: Replacement of Logical Equivalents
  dependencies:
