    - symbol: w
      name: second truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.second_truth_assignment
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    For all \(\varphi,\psi\in\WFF\),
    \[
    \neg(\varphi\land\psi)
    \equiv
    \neg\varphi\lor\neg\psi,
    \]
    and
    \[
    \neg(\varphi\lor\psi)
    \equiv
    \neg\varphi\land\neg\psi.
    \]
  quantified_form: |-
    \[
    \begin{gathered}
    (\forall\varphi,\psi\in\WFF)
    \left[
    \neg(\varphi\land\psi)
    \equiv
    \neg\varphi\lor\neg\psi
    \right],\\
    (\forall\varphi,\psi\in\WFF)
    \left[
    \neg(\varphi\lor\psi)
    \equiv
    \neg\varphi\land\neg\psi
    \right].
    \end{gathered}
    \]
  interpretation: Negation swaps conjunction with disjunction when pushed inward.
  readable_decomposition: |-
    \[
    \underbrace{\neg(\varphi\land\psi)}_{\text{not both}}
    \equiv
    \underbrace{\neg\varphi\lor\neg\psi}_{\text{at least one fails}},
    \qquad
    \underbrace{\neg(\varphi\lor\psi)}_{\text{neither}}
    \equiv
    \underbrace{\neg\varphi\land\neg\psi}_{\text{both fail}}.
    \]
  proof_sketch: Use a two-variable truth table or unfold the semantic clauses for \(\neg,\land,\lor\).
