    - symbol: \varphi,\psi,\chi,\theta
      name: formula metavariables
      meaning: metavariables ranging over propositional well-formed formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula_metavariables
    - symbol: \WFF
      name: well-formed formula set
      meaning: the set of propositional well-formed formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_set
    - symbol: v
      name: truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.truth_assignment
    - symbol: w
      name: second truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.second_truth_assignment
    - symbol: \widehat v
      name: extended truth assignment
      meaning: unique extension to formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.extended_truth_assignment
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    For all formulas \(\varphi,\psi,\chi\in\WFF\), the following logical equivalences hold.

    Commutativity:
    \[
    \varphi\land\psi\equiv\psi\land\varphi,
    \qquad
    \varphi\lor\psi\equiv\psi\lor\varphi.
    \]

    Associativity:
    \[
    (\varphi\land\psi)\land\chi
    \equiv
    \varphi\land(\psi\land\chi),
    \qquad
    (\varphi\lor\psi)\lor\chi
    \equiv
    \varphi\lor(\psi\lor\chi).
    \]

    Idempotence:
    \[
    \varphi\land\varphi\equiv\varphi,
    \qquad
    \varphi\lor\varphi\equiv\varphi.
    \]

    Double negation:
    \[
    \neg\neg\varphi\equiv\varphi.
    \]
  quantified_form: |-
    \[
    (\forall\varphi,\psi,\chi\in\WFF)
    \left[
    \begin{gathered}
    \varphi\land\psi\equiv\psi\land\varphi,\quad
    \varphi\lor\psi\equiv\psi\lor\varphi,\\
    (\varphi\land\psi)\land\chi\equiv\varphi\land(\psi\land\chi),\quad
    (\varphi\lor\psi)\lor\chi\equiv\varphi\lor(\psi\lor\chi),\\
    \varphi\land\varphi\equiv\varphi,\quad
    \varphi\lor\varphi\equiv\varphi,\quad
    \neg\neg\varphi\equiv\varphi
    \end{gathered}
    \right].
    \]
  interpretation: These are the basic algebraic laws for conjunction, disjunction, and negation.
  proof_sketch: Prove each equivalence by truth-table calculation or by unfolding the semantic clauses
    for \(\widehat v\).
