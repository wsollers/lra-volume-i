  body: |-
    For all \(\varphi,\psi,\chi\in\WFF\),
    \[
    \varphi\land(\psi\lor\chi)
    \equiv
    (\varphi\land\psi)\lor(\varphi\land\chi),
    \]
    and
    \[
    \varphi\lor(\psi\land\chi)
    \equiv
    (\varphi\lor\psi)\land(\varphi\lor\chi).
    \]
  quantified_form: |-
    \[
    \begin{gathered}
    (\forall\varphi,\psi,\chi\in\WFF)
    \left[
    \varphi\land(\psi\lor\chi)
    \equiv
    (\varphi\land\psi)\lor(\varphi\land\chi)
    \right],\\
    (\forall\varphi,\psi,\chi\in\WFF)
    \left[
    \varphi\lor(\psi\land\chi)
    \equiv
    (\varphi\lor\psi)\land(\varphi\lor\chi)
    \right].
    \end{gathered}
    \]
  interpretation: Conjunction distributes over disjunction, and disjunction distributes over conjunction.
    These laws are the main algebraic engine behind CNF and DNF conversion.
