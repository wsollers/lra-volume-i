    - symbol: \equiv
      name: logical equivalence symbol
      meaning: logical equivalence relation between formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.logical_equivalence
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    Replacing logically equivalent formulas inside a formula context preserves logical equivalence:
    \[
    \varphi\equiv\psi
    \Longrightarrow
    C[\varphi]\equiv C[\psi].
    \]
  quantified_form: |-
    \[
    (\forall\varphi,\psi\in\WFF)
    (\forall C[-])
    \left[
    \operatorname{FormulaContext}(C[-])
    \land
    \varphi\equiv\psi
    \to
    C[\varphi]\equiv C[\psi]
    \right].
    \]
  interpretation: 'Logical equivalence is substitutive: equivalent formulas may be replaced inside larger
    formulas without changing truth behavior.'
  proof_sketch: Prove by structural induction on the context \(C[-]\). The placeholder case uses \(\varphi\equiv\psi\).
    The connective cases follow from the semantic truth clauses.
