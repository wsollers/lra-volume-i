      registry_id: propositional_logic.formula_set
    - symbol: \varphi
      name: formula metavariable
      meaning: a metavariable ranging over formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula
    - symbol: \to
      name: conditional
      meaning: binary propositional connective
      scope: global
      status: canonical
      registry_id: propositional_logic.conditional
    - symbol: v
      name: truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.truth_assignment
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    Let \(\top\) be any tautological formula and let \(\bot\) be any contradictory formula. Then for every \(\varphi\in\WFF\):
    \[
    \varphi\land\top\equiv\varphi,
    \qquad
    \varphi\lor\bot\equiv\varphi,
    \]
    and
    \[
    \varphi\land\bot\equiv\bot,
    \qquad
    \varphi\lor\top\equiv\top.
    \]
  quantified_form: |-
    \[
    \begin{aligned}
    &(\operatorname{Tautology}(\top)\land \operatorname{Contradiction}(\bot))
    \to
    (\forall\varphi\in\WFF)\\
    &\quad
    \left[
    (\varphi\land\top\equiv\varphi)
    \land
    (\varphi\lor\bot\equiv\varphi)
    \land
    (\varphi\land\bot\equiv\bot)
    \land
    (\varphi\lor\top\equiv\top)
    \right].
    \end{aligned}
    \]
  interpretation: Tautologies act like true constants; contradictions act like false constants.
  proof_sketch: Evaluate both sides under an arbitrary truth assignment.
