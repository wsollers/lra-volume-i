      scope: chapter
      status: canonical
      registry_id: propositional_logic.logical_equivalence
    - symbol: \WFF
      name: well-formed formula set
      meaning: the set of propositional well-formed formulas
      scope: chapter
      status: canonical
      registry_id: propositional_logic.formula_set
    - symbol: \varphi,\psi,\chi,\theta
      name: formula metavariables
      meaning: metavariables ranging over propositional well-formed formulas
      scope: global
      status: canonical
      registry_id: propositional_logic.formula_metavariables
    - symbol: v
      name: truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.truth_assignment
    - symbol: w
      name: second truth assignment
      meaning: truth assignment on propositional variables
      scope: global
      status: canonical
      registry_id: propositional_logic.second_truth_assignment
  relations:
    defines: []
    uses: []
  proof_required: true
  body: |-
    For all \(\varphi,\psi\in\WFF\),
    \[
    \varphi\leftrightarrow\psi
    \equiv
    (\varphi\to\psi)\land(\psi\to\varphi),
    \]
    and
    \[
    \varphi\leftrightarrow\psi
    \equiv
    (\varphi\land\psi)\lor(\neg\varphi\land\neg\psi).
    \]
  quantified_form: |-
    \[
    \begin{gathered}
    (\forall\varphi,\psi\in\WFF)
    \left[
    \varphi\leftrightarrow\psi
    \equiv
    (\varphi\to\psi)\land(\psi\to\varphi)
    \right],\\
    (\forall\varphi,\psi\in\WFF)
    \left[
    \varphi\leftrightarrow\psi
    \equiv
    (\varphi\land\psi)\lor(\neg\varphi\land\neg\psi)
    \right].
    \end{gathered}
    \]
  interpretation: 'A biconditional says that two formulas have the same truth value: both true or both
    false.'
  proof_sketch: Use the truth clause for biconditional, or rewrite using the conditional equivalence laws.
